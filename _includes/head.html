{%- assign lang = page.lang | default: 'en' -%}
{%- assign t = site.data.i18n[lang] -%}
<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
<script>
  /* Motion enable-gate — runs before paint, no external deps.
     Adds `motion` to <html> ONLY when motion is allowed AND the reveal
     observer is supported, so the CSS hidden-state for `.reveal` applies
     before first paint (no FOUC). Fails open on any error. A watchdog
     strips `motion` if reveal.js never signals ready (blocked/failed load),
     so content can never stay stuck hidden. */
  (function () {
    try {
      var el = document.documentElement;
      var mq = window.matchMedia;
      var reduce = mq && mq('(prefers-reduced-motion: reduce)').matches;
      if (!reduce && 'IntersectionObserver' in window) {
        el.classList.add('motion');
        window.setTimeout(function () {
          if (el.getAttribute('data-reveal-ready') !== 'true') {
            el.classList.remove('motion');
          }
        }, 3000);
      }
    } catch (e) { /* fail open: no motion class => content visible */ }
  })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f1e8">

    {% seo %}
    {% include structured-data.html %}

    {%- comment -%} hreflang alternates for SEO {%- endcomment -%}
    {%- if page.url == '/' -%}
      <link rel="alternate" hreflang="en" href="{{ '/' | absolute_url }}">
      <link rel="alternate" hreflang="zh-CN" href="{{ '/zh/' | absolute_url }}">
      <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
    {%- elsif page.url == '/zh/' -%}
      <link rel="alternate" hreflang="en" href="{{ '/' | absolute_url }}">
      <link rel="alternate" hreflang="zh-CN" href="{{ '/zh/' | absolute_url }}">
      <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
    {%- elsif page.alternate -%}
      <link rel="alternate" hreflang="{% if lang == 'en' %}zh-CN{% else %}en{% endif %}" href="{{ page.alternate | absolute_url }}">
      <link rel="alternate" hreflang="{{ t.html_lang }}" href="{{ page.url | absolute_url }}">
    {%- endif -%}

    <link rel="alternate" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title | escape }}">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
