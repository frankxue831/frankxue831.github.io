{%- assign lang = page.lang | default: 'en' -%}
{%- assign t = site.data.i18n[lang] -%}
<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f1e8">

    {% seo %}

    {%- comment -%} hreflang alternates for SEO {%- endcomment -%}
    {%- if page.url == '/' -%}
      <link rel="alternate" hreflang="en" href="{{ '/' | absolute_url }}">
      <link rel="alternate" hreflang="zh-CN" href="{{ '/zh/' | absolute_url }}">
      <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
    {%- elsif page.url == '/zh/' -%}
      <link rel="alternate" hreflang="en" href="{{ '/' | absolute_url }}">
      <link rel="alternate" hreflang="zh-CN" href="{{ '/zh/' | absolute_url }}">
      <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
    {%- elsif page.alternate -%}
      <link rel="alternate" hreflang="{% if lang == 'en' %}zh-CN{% else %}en{% endif %}" href="{{ page.alternate | absolute_url }}">
      <link rel="alternate" hreflang="{{ t.html_lang }}" href="{{ page.url | absolute_url }}">
    {%- endif -%}

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23f5f1e8'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-size='22' fill='%231e40af'%3Ef%3C/text%3E%3C/svg%3E">
    <link rel="alternate" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title | escape }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;family=Noto+Serif+SC:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
