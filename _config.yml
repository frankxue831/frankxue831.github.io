title: Frank Xue
tagline: Software engineer.
author:
  name: Frank Xue
# Email intentionally omitted from public site for now.
# When re-enabling, restore `email:` and `author.email:` below;
# the footer link, hero meta, contact form action, and any
# `mailto:` hrefs in the page templates will pick it up.
description: >-
  Personal site of Frank Xue — software engineer. Notes and selected work.
baseurl: ""
url: "https://www.frankxue.dev"
lang: en

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

github_username: frankxue831
# linkedin_username:
# twitter_username:

defaults:
  - scope:
      path: ""
    values:
      layout: default
      # Social/share card. PNG (not SVG) so link previews render on
      # iMessage, Slack, X, LinkedIn, WhatsApp, Discord — none of which
      # rasterize SVG og:images. jekyll-seo-tag emits og:image plus
      # width/height/alt from this map.
      image:
        path: /assets/img/social-card.png
        width: 1200
        height: 630
        alt: "Frank Xue — software engineer. Building auditable tools for code, crypto, and agents."

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - docs/superpowers/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - CLAUDE.md
  - scripts/
