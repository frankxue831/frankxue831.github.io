title: Frank Xue
tagline: Software engineer.
author:
  name: Frank Xue
# Email intentionally omitted from public site for now.
# When re-enabling, restore `email:` and `author.email:` below;
# the footer link, hero meta, contact form action, and any
# `mailto:` hrefs in the page templates will pick it up.
description: >-
  Personal site of Frank Xue — software engineer. Notes and selected work.
baseurl: ""
url: "https://www.frankxue.dev"
lang: en

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Writing/Notes live in a collection (not _posts) so each note declares its own
# lang + alternate + permalink, mirroring the bilingual page pattern.
collections:
  notes:
    output: true

# Atom feed. jekyll-feed's main feed is _posts-only (and there are none, so it
# was empty). Move that empty posts feed aside and let the notes collection
# feed claim /feed.xml — head.html already links /feed.xml. One combined feed,
# both languages.
feed:
  path: feed/posts.xml
  collections:
    notes:
      path: feed.xml

github_username: frankxue831
# linkedin_username:
# twitter_username:

defaults:
  - scope:
      path: ""
    values:
      layout: default
      # Social/share card. PNG (not SVG) so link previews render on
      # iMessage, Slack, X, LinkedIn, WhatsApp, Discord — none of which
      # rasterize SVG og:images. jekyll-seo-tag emits og:image plus
      # width/height/alt from this map.
      image:
        path: /assets/img/social-card.png
        width: 1200
        height: 630
        alt: "Frank Xue — software engineer. Building auditable tools for code, crypto, and agents."
  # Notes are long-form documents; the more-specific scope sets their layout
  # while inheriting the share image above.
  - scope:
      path: ""
      type: notes
    values:
      layout: note

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - docs/superpowers/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - CLAUDE.md
  - scripts/
