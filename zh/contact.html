---
layout: default
title: 联系
permalink: /zh/contact/
description: 联系 Frank Xue。
lang: zh
alternate: /contact/
---

<section class="page-header wrap">
    <p class="page-header__eyebrow">(03)  联系</p>
    <h1 class="page-header__title">
        保持
        <em>联系。</em>
    </h1>
    <p class="page-header__lede">
        邮件最快。下面的表单也可以——会落到同一个邮箱。
    </p>
</section>

<section class="section wrap">
    <div class="contact-grid">
        <div class="contact-intro">
            <p>
                每一条消息我都会读。
                无论是项目想法、问题,还是单纯打个招呼——我都很乐意听到。
            </p>

            <dl class="contact-direct">
                <dt>邮件</dt>
                <dd>
                    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
                </dd>
                <dt>GitHub</dt>
                <dd>
                    <a href="https://github.com/{{ site.github_username }}" rel="noopener noreferrer">@{{ site.github_username }}</a>
                </dd>
                <dt>回复时间</dt>
                <dd style="font-family:var(--mono);font-size:var(--text-sm);color:var(--fg-muted);">
                    一般在几天内回复。
                </dd>
            </dl>
        </div>

        <form class="form"
              action="mailto:{{ site.email }}"
              method="POST"
              enctype="text/plain">
            <div class="field">
                <label class="field__label" for="name">姓名 <span class="req" aria-hidden="true">*</span></label>
                <input class="field__input" type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="field">
                <label class="field__label" for="email">邮件 <span class="req" aria-hidden="true">*</span></label>
                <input class="field__input" type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="field">
                <label class="field__label" for="subject">主题</label>
                <input class="field__input" type="text" id="subject" name="subject">
            </div>

            <div class="field">
                <label class="field__label" for="message">信息 <span class="req" aria-hidden="true">*</span></label>
                <textarea class="field__textarea" id="message" name="message" rows="5" required></textarea>
            </div>

            <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">

            <button class="btn" type="submit">
                发送
                <span class="btn__arrow" aria-hidden="true">→</span>
            </button>

            <p class="form__note">
                标 <span style="color:var(--accent);">*</span> 的为必填项。
                我只会用你的邮件回复。
            </p>
        </form>
    </div>
</section>
