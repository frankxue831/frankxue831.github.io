# Internationalization strings.
# Page front matter sets `lang: en` or `lang: zh`; includes pull
# the matching block.

en:
  html_lang: "en"
  tagline: "Personal site of Frank Xue — software engineer. Notes and selected work."
  nav:
    home: "Index"
    about: "About"
    work: "Work"
    contact: "Contact"
    writing: "Writing"
  switcher:
    label: "中文"
    aria: "Switch to Chinese"
  footer:
    elsewhere: "Elsewhere"
    colophon: "Colophon"
    set_in: "Set in"
    built_with: "Built with Jekyll. Hosted on GitHub Pages."
    last_built: "Last built"
  project_summary:
    aria: "Project summary"
    role: "Role"
    status: "Status"
    stack: "Stack"
    release: "Release"
    links: "Links"
    source: "Source"
    owner: "Personal project"
    key_outcome: "Key outcome"
  theme:
    label: "Theme"
    auto: "Auto"
    light: "Light"
    dark: "Dark"
    # {current} and {next} are substituted by theme.js on load. The whole
    # sentence is localized so each language owns its own punctuation +
    # word order. Server-rendered aria-label uses `label` as a generic
    # fallback for the brief window before theme.js runs.
    aria_template: "Theme: {current}. Switch to {next}."
  toc:
    # Contents rail on project detail pages. Built by contents.js from the
    # page's <h2> headings; this label is the rail heading + nav aria-label.
    label: "On this page"
  install:
    # Copy-to-clipboard install command on the gm-crypto-rs detail page.
    label: "Install"
    copy: "Copy"
    copied: "Copied"
    aria: "Copy install command"
  notes:
    # Writing/Notes section.
    all: "All notes"
    read_more: "Read →"
    none: "Nothing published yet."

zh:
  html_lang: "zh-CN"
  tagline: "Frank Xue 的个人主页。软件工程师，记一些笔记，放几个项目。"
  nav:
    home: "首页"
    about: "关于"
    work: "作品"
    contact: "联系"
    writing: "写作"
  switcher:
    label: "EN"
    aria: "切换为英文"
  footer:
    elsewhere: "其他平台"
    colophon: "字体说明"
    set_in: "字体使用"
    built_with: "Jekyll 构建，托管于 GitHub Pages。"
    last_built: "最近构建"
  project_summary:
    aria: "项目摘要"
    role: "角色"
    status: "状态"
    stack: "技术栈"
    release: "版本"
    links: "链接"
    source: "源码"
    owner: "个人项目"
    key_outcome: "关键结果"
  theme:
    label: "主题"
    auto: "跟随系统"
    light: "浅色"
    dark: "深色"
    aria_template: "主题：{current}。切换到{next}。"
  toc:
    label: "本页内容"
  install:
    label: "安装"
    copy: "复制"
    copied: "已复制"
    aria: "复制安装命令"
  notes:
    all: "全部笔记"
    read_more: "阅读 →"
    none: "还没有发布内容。"
